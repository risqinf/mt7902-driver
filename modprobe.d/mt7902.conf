#
# MT7902 driver — modprobe blacklist.
#
# The MT7902 is driven here by a custom side-loaded build of the mt76 stack
# installed under /lib/modules/mt7902_custom and loaded explicitly by
# mt7902-load.sh (via the mt7902.service systemd unit).
#
# These blacklist entries stop the kernel from auto-loading the stock in-tree
# modules, which would otherwise bind to the device first and prevent the
# custom modules from claiming it. The custom loader uses insmod with absolute
# paths, so it is unaffected by these blacklist rules.

# Wi-Fi: stock mt76 connac stack and device drivers.
blacklist mt7921e
blacklist mt7925e
blacklist mt7925_common
blacklist mt7921_common
blacklist mt792x_lib
blacklist mt76_connac_lib
blacklist mt76

# Bluetooth: stock MediaTek/USB transport drivers.
blacklist btusb
blacklist btmtk
